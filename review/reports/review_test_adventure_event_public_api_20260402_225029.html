    <script>
        const md = "## Code Review: `test_adventure_event_public_api.py`\n\n---\n\n### 1. \u0411\u0430\u0433 \u2014 \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0443\u0435\u0442 `assert found_event is not None`\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0430\u0433\n\n`wait_for_event_by_id_in_public_api` \u043c\u043e\u0436\u0435\u0442 \u0432\u0435\u0440\u043d\u0443\u0442\u044c `None`, \u0435\u0441\u043b\u0438 \u0438\u0432\u0435\u043d\u0442 \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d \u0437\u0430 \u0432\u0441\u0435 \u0440\u0435\u0442\u0440\u0430\u0438. \u0421\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0436\u0435 \u0430\u0441\u0441\u0435\u0440\u0442 \u0443\u043f\u0430\u0434\u0451\u0442 \u0441 `AttributeError`, \u0430 \u043d\u0435 \u0441 \u043f\u043e\u043d\u044f\u0442\u043d\u044b\u043c \u0441\u043e\u043e\u0431\u0449\u0435\u043d\u0438\u0435\u043c \u043e \u043f\u0440\u043e\u0432\u0430\u043b\u0435.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nfound_event = public_api_client.wait_for_event_by_id_in_public_api(\n    event_id=expected_event_id, ...\n)\nassert found_event.meta.event_id == expected_event_id  # AttributeError \u0435\u0441\u043b\u0438 None\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\nfound_event = public_api_client.wait_for_event_by_id_in_public_api(\n    event_id=expected_event_id, ...\n)\nassert found_event is not None, (\n    f\"\u0418\u0432\u0435\u043d\u0442 event_id={expected_event_id} \u043d\u0435 \u043f\u043e\u044f\u0432\u0438\u043b\u0441\u044f \u0432 public API \"\n    f\"\u0437\u0430 {config.API_RETRY_COUNT} \u043f\u043e\u043f\u044b\u0442\u043e\u043a\"\n)\nassert found_event.meta.event_id == expected_event_id, ...\n```\n\n---\n\n### 2. \u0411\u0430\u0433 \u2014 `json.JSONDecodeError` \u043d\u0435 \u043e\u0431\u0440\u0430\u0431\u0430\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0430\u0433 / \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c\n\n\u0415\u0441\u043b\u0438 `created_event.json` \u043f\u043e\u0432\u0440\u0435\u0436\u0434\u0451\u043d, \u0442\u0435\u0441\u0442 \u0443\u043f\u0430\u0434\u0451\u0442 \u0441 \u043d\u0435\u043e\u0431\u0440\u0430\u0431\u043e\u0442\u0430\u043d\u043d\u044b\u043c \u0438\u0441\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435\u043c \u0431\u0435\u0437 \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u0430.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nraw = CREATED_EVENT_DATA_PATH.read_text()\nreturn json.loads(raw)\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\ntry:\n    return json.loads(CREATED_EVENT_DATA_PATH.read_text())\nexcept json.JSONDecodeError as e:\n    pytest.fail(f\"\u0424\u0430\u0439\u043b {CREATED_EVENT_DATA_PATH} \u043f\u043e\u0432\u0440\u0435\u0436\u0434\u0451\u043d (\u043d\u0435\u0432\u0430\u043b\u0438\u0434\u043d\u044b\u0439 JSON): {e}\")\n```\n\n---\n\n### 3. \u0411\u0430\u0433 \u2014 \u043d\u0435\u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u044b\u0439 \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u043a\u043b\u044e\u0447\u0430\u043c \u0431\u0435\u0437 \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0438\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0430\u0433\n\n`created_event_data[\"event_id\"]` \u0438 `[\"analytics_id\"]` \u0432\u044b\u0431\u0440\u043e\u0441\u044f\u0442 `KeyError`, \u0435\u0441\u043b\u0438 \u0444\u0430\u0439\u043b \u043d\u0435 \u0441\u043e\u0434\u0435\u0440\u0436\u0438\u0442 \u043e\u0436\u0438\u0434\u0430\u0435\u043c\u044b\u0445 \u043a\u043b\u044e\u0447\u0435\u0439. \u041f\u0430\u0442\u0442\u0435\u0440\u043d \u043f\u043e\u0432\u0442\u043e\u0440\u044f\u0435\u0442\u0441\u044f \u0438 \u0432 \u0440\u0430\u0441\u0447\u0451\u0442\u0435 \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nexpected_event_id = created_event_data[\"event_id\"]      # KeyError\nexpected_analytics_id = created_event_data[\"analytics_id\"]  # KeyError\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\nrequired_keys = {\"event_id\", \"analytics_id\"}\nmissing = required_keys - created_event_data.keys()\nassert not missing, (\n    f\"\u0412 \u0444\u0430\u0439\u043b\u0435 {CREATED_EVENT_DATA_PATH} \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0443\u044e\u0442 \u043a\u043b\u044e\u0447\u0438: {missing}\"\n)\nexpected_event_id = created_event_data[\"event_id\"]\nexpected_analytics_id = created_event_data[\"analytics_id\"]\n```\n\n---\n\n### 4. \u041d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c \u2014 \u043c\u0435\u0436\u0442\u0435\u0441\u0442\u043e\u0432\u0430\u044f \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u0447\u0435\u0440\u0435\u0437 \u0444\u0430\u0439\u043b\u043e\u0432\u0443\u044e \u0441\u0438\u0441\u0442\u0435\u043c\u0443\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c / \u041d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c\n\n`_load_created_event_data()` \u0432\u044b\u0437\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u0432\u043d\u0443\u0442\u0440\u0438 \u0442\u0435\u043b\u0430 \u0442\u0435\u0441\u0442\u0430, \u0445\u043e\u0442\u044f \u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0438\u043d\u0444\u0440\u0430\u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u043d\u043e\u0439 \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c\u044e. \u042d\u0442\u043e \u043d\u0430\u0440\u0443\u0448\u0430\u0435\u0442 \u0438\u0437\u043e\u043b\u044f\u0446\u0438\u044e \u0438 \u0434\u0435\u043b\u0430\u0435\u0442 \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u0437\u0430\u043f\u0443\u0441\u043a\u0430 \u0442\u0435\u0441\u0442\u043e\u0432 \u0437\u043d\u0430\u0447\u0438\u043c\u044b\u043c. \u041f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0439 \u043f\u0430\u0442\u0442\u0435\u0440\u043d \u2014 \u0432\u044b\u043d\u0435\u0441\u0442\u0438 \u0432 \u0444\u0438\u043a\u0441\u0442\u0443\u0440\u0443 pytest.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441 \u2014 \u0441\u043a\u0440\u044b\u0442\u0430\u044f \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u0432\u043d\u0443\u0442\u0440\u0438 \u0442\u0435\u0441\u0442\u0430\ndef test_created_event_appears_in_public_api(self, public_api_client):\n    created_event_data = _load_created_event_data()\n    ...\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c \u2014 \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u044f\u0432\u043d\u0430\u044f \u0438 \u043f\u0435\u0440\u0435\u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u043c\u0430\u044f\n@pytest.fixture(scope=\"session\")\ndef created_event_data() -> dict:\n    \"\"\"\u0414\u0430\u043d\u043d\u044b\u0435 \u0438\u0432\u0435\u043d\u0442\u0430, \u0441\u043e\u0437\u0434\u0430\u043d\u043d\u043e\u0433\u043e UI-\u0442\u0435\u0441\u0442\u043e\u043c.\"\"\"\n    assert CREATED_EVENT_DATA_PATH.exists(), (\n        f\"\u0424\u0430\u0439\u043b \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d: {CREATED_EVENT_DATA_PATH}. \"\n        \"\u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0437\u0430\u043f\u0443\u0441\u0442\u0438\u0442\u0435 UI \u0442\u0435\u0441\u0442.\"\n    )\n    try:\n        return json.loads(CREATED_EVENT_DATA_PATH.read_text())\n    except json.JSONDecodeError as e:\n        pytest.fail(f\"\u041f\u043e\u0432\u0440\u0435\u0436\u0434\u0451\u043d\u043d\u044b\u0439 JSON: {e}\")\n\ndef test_created_event_appears_in_public_api(\n    self,\n    public_api_client: LiveOpsPublicApiClient,\n    created_event_data: dict,   # \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u044f\u0432\u043d\u0430\u044f\n) -> None:\n    ...\n```\n\n---\n\n### 5. \u0411\u0430\u0433 \u2014 `len(api_response.errors)` \u043c\u043e\u0436\u0435\u0442 \u0443\u043f\u0430\u0441\u0442\u044c \u0441 `TypeError`\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0430\u0433\n\n\u0415\u0441\u043b\u0438 `errors` \u0432 `PublicApiResponse` \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c `None` (\u0430 \u043d\u0435 \u043f\u0443\u0441\u0442\u044b\u043c \u0441\u043f\u0438\u0441\u043a\u043e\u043c), `len(None)` \u0432\u044b\u0431\u0440\u043e\u0441\u0438\u0442 `TypeError` \u0432 \u0441\u0442\u0440\u043e\u043a\u0435 \u043b\u043e\u0433\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nlogger.info(\"...\u043e\u0448\u0438\u0431\u043e\u043a=%d\", len(api_response.errors))\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\nlogger.info(\"...\u043e\u0448\u0438\u0431\u043e\u043a=%d\", len(api_response.errors or []))\n```\n\n\u041b\u0438\u0431\u043e \u0443\u0431\u0435\u0434\u0438\u0442\u044c\u0441\u044f, \u0447\u0442\u043e Pydantic-\u043c\u043e\u0434\u0435\u043b\u044c `PublicApiResponse` \u043e\u0431\u044a\u044f\u0432\u043b\u044f\u0435\u0442 `errors: list[str] = []`.\n\n---\n\n### 6. \u0421\u043b\u0430\u0431\u044b\u0435 \u0430\u0441\u0441\u0435\u0440\u0442\u044b \u043d\u0430 \u043f\u0443\u0441\u0442\u0443\u044e \u0441\u0442\u0440\u043e\u043a\u0443\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0421\u0442\u0438\u043b\u044c / \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c\n\n`!= \"\"` \u043d\u0435 \u0437\u0430\u0449\u0438\u0449\u0430\u0435\u0442 \u043e\u0442 `None`. Pydantic-\u043f\u043e\u043b\u044f \u043c\u043e\u0433\u0443\u0442 \u0431\u044b\u0442\u044c `None` \u043f\u0440\u0438 \u043d\u0435\u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u043e\u043c \u043e\u0442\u0432\u0435\u0442\u0435 API.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nassert event.meta.analytics_id != \"\", \"AnalyticsId \u043d\u0435 \u0434\u043e\u043b\u0436\u0435\u043d \u0431\u044b\u0442\u044c \u043f\u0443\u0441\u0442\u044b\u043c\"\nassert package.url != \"\", f\"URL \u043f\u0430\u043a\u0435\u0442\u0430 \u043d\u0435 \u0434\u043e\u043b\u0436\u0435\u043d \u0431\u044b\u0442\u044c \u043f\u0443\u0441\u0442\u044b\u043c...\"\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\nassert event.meta.analytics_id, \"AnalyticsId \u043d\u0435 \u0434\u043e\u043b\u0436\u0435\u043d \u0431\u044b\u0442\u044c \u043f\u0443\u0441\u0442\u044b\u043c \u0438\u043b\u0438 None\"\nassert package.url, f\"URL \u043f\u0430\u043a\u0435\u0442\u0430 \u043d\u0435 \u0434\u043e\u043b\u0436\u0435\u043d \u0431\u044b\u0442\u044c \u043f\u0443\u0441\u0442\u044b\u043c \u0438\u043b\u0438 None \u0434\u043b\u044f \u0438\u0432\u0435\u043d\u0442\u0430 {event_id}\"\n```\n\n---\n\n### 7. Magic numbers \u0432 \u0440\u0430\u0441\u0447\u0451\u0442\u0435 \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438 \u0438 \u0432 \u0434\u043e\u043f\u0443\u0441\u0442\u0438\u043c\u043e\u0439 \u043f\u043e\u0433\u0440\u0435\u0448\u043d\u043e\u0441\u0442\u0438\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c / \u0421\u0442\u0438\u043b\u044c\n\n\u0414\u0435\u0444\u043e\u043b\u0442\u043d\u044b\u0435 \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f `(2, 1, 1)` \u0438 \u043f\u043e\u0433\u0440\u0435\u0448\u043d\u043e\u0441\u0442\u044c `60` \u2014 \u043d\u0435\u043c\u043e\u0442\u0438\u0432\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u044b\u0435 \u0447\u0438\u0441\u043b\u0430, \u0441\u043c\u044b\u0441\u043b \u043a\u043e\u0442\u043e\u0440\u044b\u0445 \u043d\u0435\u043e\u0447\u0435\u0432\u0438\u0434\u0435\u043d \u043f\u0440\u0438 \u0447\u0442\u0435\u043d\u0438\u0438.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nexpected_duration_sec = (\n    int(created_event_data.get(\"duration_days\", 2)) * 86400\n    + int(created_event_data.get(\"duration_hours\", 1)) * 3600\n    + int(created_event_data.get(\"duration_minutes\", 1)) * 60\n)\nassert abs(found_event.meta.duration_sec - expected_duration_sec) <= 60, ...\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\n_SECS_PER_DAY = 86400\n_SECS_PER_HOUR = 3600\n_SECS_PER_MINUTE = 60\n_DURATION_TOLERANCE_SEC = 60  # \u0414\u043e\u043f\u0443\u0441\u043a \u043d\u0430 \u0437\u0430\u0434\u0435\u0440\u0436\u043a\u0443 \u0430\u043a\u0442\u0438\u0432\u0430\u0446\u0438\u0438 \u0438\u0432\u0435\u043d\u0442\u0430 \u043d\u0430 \u0441\u0435\u0440\u0432\u0435\u0440\u0435\n\n# \u0414\u0435\u0444\u043e\u043b\u0442\u044b \u0434\u043e\u043b\u0436\u043d\u044b \u0441\u043e\u0432\u043f\u0430\u0434\u0430\u0442\u044c \u0441 \u0442\u0435\u043c, \u0447\u0442\u043e \u0441\u043e\u0437\u0434\u0430\u0451\u0442 UI-\u0442\u0435\u0441\u0442, \u0438\u043b\u0438 \u0431\u0440\u0430\u0442\u044c\u0441\u044f \u0438\u0437 \u0434\u0430\u043d\u043d\u044b\u0445 \u044f\u0432\u043d\u043e\nexpected_duration_sec = (\n    int(created_event_data[\"duration_days\"]) * _SECS_PER_DAY\n    + int(created_event_data[\"duration_hours\"]) * _SECS_PER_HOUR\n    + int(created_event_data[\"duration_minutes\"]) * _SECS_PER_MINUTE\n)\nassert abs(found_event.meta.duration_sec - expected_duration_sec) <= _DURATION_TOLERANCE_SEC, ...\n```\n\n\u0415\u0441\u043b\u0438 \u0434\u0435\u0444\u043e\u043b\u0442\u044b \u043e\u0431\u043e\u0441\u043d\u043e\u0432\u0430\u043d\u044b (UI-\u0442\u0435\u0441\u0442 \u0432\u0441\u0435\u0433\u0434\u0430 \u0441\u043e\u0437\u0434\u0430\u0451\u0442 \u0438\u0432\u0435\u043d\u0442 \u0441 \u0442\u0430\u043a\u0438\u043c\u0438 \u043f\u0430\u0440\u0430\u043c\u0435\u0442\u0440\u0430\u043c\u0438), \u0438\u0445 \u043d\u0443\u0436\u043d\u043e \u0432\u044b\u043d\u0435\u0441\u0442\u0438 \u0432 \u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u043d\u044b\u0435 \u043a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u044b \u0441 \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0435\u043c.\n\n---\n\n### 8. `_validate_package` \u2014 \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0443\u0435\u0442 \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 URL-\u0444\u043e\u0440\u043c\u0430\u0442\u0430\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c\n\n\u041f\u0440\u043e\u0432\u0435\u0440\u044f\u0435\u0442\u0441\u044f \u043d\u0435\u043f\u0443\u0441\u0442\u043e\u0442\u0430 URL, \u043d\u043e \u043d\u0435 \u0435\u0433\u043e \u0432\u0430\u043b\u0438\u0434\u043d\u043e\u0441\u0442\u044c. \u0411\u0438\u0442\u0430\u044f \u0441\u0442\u0440\u043e\u043a\u0430 \u0442\u0438\u043f\u0430 `\"null\"` \u0438\u043b\u0438 `\"undefined\"` \u043f\u0440\u043e\u0439\u0434\u0451\u0442 \u0430\u0441\u0441\u0435\u0440\u0442.\n\n```python\n# \u274c \u0421\u0435\u0439\u0447\u0430\u0441\nassert package.url != \"\", f\"URL \u043f\u0430\u043a\u0435\u0442\u0430 \u043d\u0435 \u0434\u043e\u043b\u0436\u0435\u043d \u0431\u044b\u0442\u044c \u043f\u0443\u0441\u0442\u044b\u043c...\"\n```\n\n```python\n# \u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c\nassert package.url and package.url.startswith((\"http://\", \"https://\")), (\n    f\"URL \u043f\u0430\u043a\u0435\u0442\u0430 \u043d\u0435\u0432\u0430\u043b\u0438\u0434\u0435\u043d: '{package.url}' \u0434\u043b\u044f \u043f\u0430\u043a\u0435\u0442\u0430 {package.package_id} \u0438\u0432\u0435\u043d\u0442\u0430 {event_id}\"\n)\n```\n\n---\n\n### 9. \u0427\u0442\u043e \u0441\u0434\u0435\u043b\u0430\u043d\u043e \u0445\u043e\u0440\u043e\u0448\u043e\n\n- **Allure-\u0430\u043d\u043d\u043e\u0442\u0430\u0446\u0438\u0438** \u2014 \u043f\u043e\u043b\u043d\u044b\u0439 \u043d\u0430\u0431\u043e\u0440 (`epic`, `feature`, `story`, `title`, `severity`, `tag`) \u0431\u0435\u0437 \u043b\u0438\u0448\u043d\u0435\u0433\u043e. \u041b\u0435\u0433\u043a\u043e \u0447\u0438\u0442\u0430\u0442\u044c \u043e\u0442\u0447\u0451\u0442\u044b.\n- **`_validate_package` \u0432\u044b\u043d\u0435\u0441\u0435\u043d \u043e\u0442\u0434\u0435\u043b\u044c\u043d\u043e** \u2014 \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e \u0438\u0437\u0431\u0435\u0433\u0430\u0435\u0442 \u0434\u0443\u0431\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u043b\u043e\u0433\u0438\u043a\u0438 \u0432\u0430\u043b\u0438\u0434\u0430\u0446\u0438\u0438 \u043f\u0430\u043a\u0435\u0442\u043e\u0432 \u0438 \u0434\u0430\u0451\u0442 \u0442\u0435\u0441\u0442\u0443 \u0447\u0438\u0442\u0430\u0442\u044c\u0441\u044f \u043a\u0430\u043a \u0441\u0446\u0435\u043d\u0430\u0440\u0438\u0439, \u0430 \u043d\u0435 \u043a\u0430\u043a \u043d\u0430\u0431\u043e\u0440 \u043f\u0440\u043e\u0432\u0435\u0440\u043e\u043a.\n- **\u041a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u044b \u0434\u043b\u044f \u0442\u0438\u043f\u043e\u0432 \u043f\u0430\u043a\u0435\u0442\u043e\u0432** \u2014 `PACKAGE_TYPE_BANNER = 1` \u0432\u043c\u0435\u0441\u0442\u043e magic numbers \u0432 \u0430\u0441\u0441\u0435\u0440\u0442\u0435. \u041f\u0430\u0442\u0442\u0435\u0440\u043d \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0439; \u043c\u043e\u0436\u043d\u043e \u0434\u043e\u0432\u0435\u0441\u0442\u0438 \u0434\u043e `IntEnum` \u0434\u043b\u044f \u0435\u0449\u0451 \u0431\u043e\u043b\u044c\u0448\u0435\u0439 \u044f\u0432\u043d\u043e\u0441\u0442\u0438.\n- **\u041b\u043e\u0433\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 `%s`-\u0444\u043e\u0440\u043c\u0430\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435** \u2014 \u043d\u0435 \u0447\u0435\u0440\u0435\u0437 f-\u0441\u0442\u0440\u043e\u043a\u0438, \u0447\u0442\u043e \u044d\u043a\u043e\u043d\u043e\u043c\u0438\u0442 \u0438\u043d\u0442\u0435\u0440\u043f\u043e\u043b\u044f\u0446\u0438\u044e \u043f\u0440\u0438 \u043e\u0442\u043a\u043b\u044e\u0447\u0451\u043d\u043d\u043e\u043c \u0443\u0440\u043e\u0432\u043d\u0435 \u043b\u043e\u0433\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.\n- **`Path(__file__).parent`** \u2014 \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0439 \u0441\u043f\u043e\u0441\u043e\u0431 \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0438\u0442\u044c \u043f\u0443\u0442\u044c \u043e\u0442\u043d\u043e\u0441\u0438\u0442\u0435\u043b\u044c\u043d\u043e \u043c\u043e\u0434\u0443\u043b\u044f, \u043d\u0435 \u0437\u0430\u0432\u0438\u0441\u0438\u0442 \u043e\u0442 CWD.\n- **Retry-\u043b\u043e\u0433\u0438\u043a\u0430 \u0438\u043d\u043a\u0430\u043f\u0441\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0430 \u0432 \u043a\u043b\u0438\u0435\u043d\u0442\u0435** \u2014 \u0442\u0435\u0441\u0442 \u043d\u0435 \u0437\u043d\u0430\u0435\u0442 \u043f\u0440\u043e `sleep` \u0438 `backoff`, \u044d\u0442\u043e \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u044c `LiveOpsPublicApiClient`.\n- **Pydantic-\u043c\u043e\u0434\u0435\u043b\u0438 \u0434\u043b\u044f \u043e\u0442\u0432\u0435\u0442\u0430 API** \u2014 \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u043d\u0430\u044f \u0432\u0430\u043b\u0438\u0434\u0430\u0446\u0438\u044f \u043e\u0442\u0434\u0435\u043b\u0435\u043d\u0430 \u043e\u0442 \u0431\u0438\u0437\u043d\u0435\u0441-\u043b\u043e\u0433\u0438\u043a\u0438 \u0442\u0435\u0441\u0442\u0430.\n";
        document.getElementById("content").innerHTML = marked.parse(md);
