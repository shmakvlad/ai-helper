    <script>
        const md = "\u0422\u0435\u043f\u0435\u0440\u044c \u0443 \u043c\u0435\u043d\u044f \u043f\u043e\u043b\u043d\u0430\u044f \u043a\u0430\u0440\u0442\u0438\u043d\u0430. \u041f\u0438\u0448\u0443 \u0440\u0435\u0432\u044c\u044e.\n\n---\n\n## Code Review: LiveOps API Tests\n\n---\n\n### 1. \u0411\u0410\u0413 \u2014 \u0414\u0430\u043d\u043d\u044b\u0435 \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438 \u043d\u0435 \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u044e\u0442\u0441\u044f, \u0442\u0435\u0441\u0442 \u0442\u0435\u0441\u0442\u0438\u0440\u0443\u0435\u0442 \u0445\u0430\u0440\u0434\u043a\u043e\u0434\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0430\u0433 | **\u0424\u0430\u0439\u043b\u044b:** `test_create_adventure_event_ui.py:130\u2013144`, `test_adventure_event_public_api.py:118\u2013127`\n\n`_save_event_id_for_api_test` \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u0435\u0442 \u0442\u043e\u043b\u044c\u043a\u043e `event_id`, `event_title`, `analytics_id`. \u041f\u043e\u043b\u044f `duration_days/hours/minutes` \u043d\u0435 \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u044e\u0442\u0441\u044f. API \u0442\u0435\u0441\u0442 \u0447\u0438\u0442\u0430\u0435\u0442 \u0438\u0445 \u0447\u0435\u0440\u0435\u0437 `.get(\"duration_days\", 2)` \u2014 \u0432\u0441\u0435\u0433\u0434\u0430 \u043f\u043e\u043b\u0443\u0447\u0430\u0435\u0442 \u0434\u0435\u0444\u043e\u043b\u0442. \u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442\u0438 \u043d\u0438\u043a\u043e\u0433\u0434\u0430 \u043d\u0435 \u0442\u0435\u0441\u0442\u0438\u0440\u0443\u0435\u0442 \u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f \u0438\u0437 UI \u0442\u0435\u0441\u0442\u0430.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\n# test_create_adventure_event_ui.py\ndef _save_event_id_for_api_test(event_id, event_title, analytics_id):\n    data = {\n        \"event_id\": int(event_id),\n        \"event_title\": event_title,\n        \"analytics_id\": analytics_id,\n        # duration_days, duration_hours, duration_minutes \u2014 \u041d\u0415 \u0441\u043e\u0445\u0440\u0430\u043d\u044f\u044e\u0442\u0441\u044f\n    }\n\n# test_adventure_event_public_api.py\nexpected_duration_sec = (\n    int(created_event_data.get(\"duration_days\", 2)) * 86400  # \u0432\u0441\u0435\u0433\u0434\u0430 2\n    + int(created_event_data.get(\"duration_hours\", 1)) * 3600  # \u0432\u0441\u0435\u0433\u0434\u0430 1\n    + int(created_event_data.get(\"duration_minutes\", 1)) * 60  # \u0432\u0441\u0435\u0433\u0434\u0430 1\n)\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:**\n```python\n# test_create_adventure_event_ui.py\ndef _save_event_id_for_api_test(event_id, event_title, analytics_id, event_test_data):\n    data = {\n        \"event_id\": int(event_id),\n        \"event_title\": event_title,\n        \"analytics_id\": analytics_id,\n        \"duration_days\": int(event_test_data[\"duration_days\"]),\n        \"duration_hours\": int(event_test_data[\"duration_hours\"]),\n        \"duration_minutes\": int(event_test_data[\"duration_minutes\"]),\n    }\n\n# test_adventure_event_public_api.py \u2014 \u0434\u0435\u0444\u043e\u043b\u0442\u044b \u0443\u0431\u0440\u0430\u043d\u044b, KeyError \u0441\u0440\u0430\u0437\u0443 \u0443\u043a\u0430\u0436\u0435\u0442 \u043d\u0430 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0443\nexpected_duration_sec = (\n    created_event_data[\"duration_days\"] * 86400\n    + created_event_data[\"duration_hours\"] * 3600\n    + created_event_data[\"duration_minutes\"] * 60\n)\n```\n\n---\n\n### 2. \u0411\u0415\u0417\u041e\u041f\u0410\u0421\u041d\u041e\u0421\u0422\u042c \u2014 \u0420\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u0441\u0435\u043a\u0440\u0435\u0442\u044b \u0432 \u043a\u043e\u0434\u0435 \u043a\u0430\u043a \u0434\u0435\u0444\u043e\u043b\u0442\u043d\u044b\u0435 \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u044c | **\u0424\u0430\u0439\u043b:** `config.py:25\u201326`\n\n`BEARER_TOKEN` \u0438 `JSON_DEBUG_KEY` \u0438\u043c\u0435\u044e\u0442 \u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f \u0432 \u043a\u043e\u0434\u0435. \u041f\u0440\u0438 \u043e\u0442\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u0438 `.env` \u0442\u0435\u0441\u0442\u044b \u0437\u0430\u043f\u0443\u0441\u0442\u044f\u0442\u0441\u044f \u0441 prod/test \u0442\u043e\u043a\u0435\u043d\u0430\u043c\u0438 \u0438\u0437 \u0440\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0438\u044f. \u0421\u0435\u043a\u0440\u0435\u0442 \u043f\u043e\u043f\u0430\u0434\u0430\u0435\u0442 \u0432 git \u0438\u0441\u0442\u043e\u0440\u0438\u044e.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\nPUBLIC_API_JSON_DEBUG_KEY: str = os.getenv(\"PUBLIC_API_JSON_DEBUG_KEY\", \"780043d4296e17bac321b88f6946239a\")\nPUBLIC_API_BEARER_TOKEN: str = os.getenv(\"PUBLIC_API_BEARER_TOKEN\", \"6be1d1774f0d22eff44339bd66ba59f9\")\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:**\n```python\nPUBLIC_API_JSON_DEBUG_KEY: str = os.environ[\"PUBLIC_API_JSON_DEBUG_KEY\"]  # KeyError \u0435\u0441\u043b\u0438 \u043d\u0435\u0442\nPUBLIC_API_BEARER_TOKEN: str = os.environ[\"PUBLIC_API_BEARER_TOKEN\"]\n```\n\u041b\u0438\u0431\u043e \u2014 \u044f\u0432\u043d\u0430\u044f \u0432\u0430\u043b\u0438\u0434\u0430\u0446\u0438\u044f \u043f\u0440\u0438 \u0441\u0442\u0430\u0440\u0442\u0435:\n```python\nPUBLIC_API_BEARER_TOKEN: str = os.getenv(\"PUBLIC_API_BEARER_TOKEN\", \"\")\nassert PUBLIC_API_BEARER_TOKEN, \"PUBLIC_API_BEARER_TOKEN \u043d\u0435 \u0437\u0430\u0434\u0430\u043d \u0432 .env\"\n```\n\n---\n\n### 3. \u0410\u0420\u0425\u0418\u0422\u0415\u041a\u0422\u0423\u0420\u0410 \u2014 \u041c\u0435\u0436\u0442\u0435\u0441\u0442\u043e\u0432\u0430\u044f \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u0447\u0435\u0440\u0435\u0437 \u0444\u0430\u0439\u043b\u043e\u0432\u0443\u044e \u0441\u0438\u0441\u0442\u0435\u043c\u0443\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430 | **\u0424\u0430\u0439\u043b\u044b:** `test_create_adventure_event_ui.py:130`, `test_adventure_event_public_api.py:43\u201353`\n\n\u041f\u0435\u0440\u0435\u0434\u0430\u0447\u0430 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u044f \u043c\u0435\u0436\u0434\u0443 UI \u0442\u0435\u0441\u0442\u043e\u043c \u0438 API \u0442\u0435\u0441\u0442\u043e\u043c \u0447\u0435\u0440\u0435\u0437 `created_event.json` \u2014 \u0430\u043d\u0442\u0438\u043f\u0430\u0442\u0442\u0435\u0440\u043d. \u0422\u0435\u0441\u0442\u044b \u043d\u0435 \u0438\u0437\u043e\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u044b: \u043f\u043e\u0440\u044f\u0434\u043e\u043a \u0437\u0430\u043f\u0443\u0441\u043a\u0430 \u0432\u0430\u0436\u0435\u043d, API \u0442\u0435\u0441\u0442 \u0443\u043f\u0430\u0434\u0451\u0442 \u0441 \u043d\u0435\u043e\u0447\u0435\u0432\u0438\u0434\u043d\u043e\u0439 \u043e\u0448\u0438\u0431\u043a\u043e\u0439 \u0435\u0441\u043b\u0438 UI \u0442\u0435\u0441\u0442 \u043d\u0435 \u0437\u0430\u043f\u0443\u0441\u043a\u0430\u043b\u0441\u044f.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\n# UI \u0442\u0435\u0441\u0442 \u043f\u0438\u0448\u0435\u0442 \u0444\u0430\u0439\u043b...\nshared_data_path.write_text(json.dumps(data, indent=2))\n\n# ...API \u0442\u0435\u0441\u0442 \u0447\u0438\u0442\u0430\u0435\u0442 \u0444\u0430\u0439\u043b \u0441 assert \u0432\u043d\u0443\u0442\u0440\u0438 \u0442\u0435\u043b\u0430 \u0442\u0435\u0441\u0442\u0430\ndef _load_created_event_data() -> dict:\n    assert CREATED_EVENT_DATA_PATH.exists(), \"\u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0437\u0430\u043f\u0443\u0441\u0442\u0438\u0442\u0435 UI \u0442\u0435\u0441\u0442\"\n    return json.loads(CREATED_EVENT_DATA_PATH.read_text())\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c** \u2014 session-scope \u0444\u0438\u043a\u0441\u0442\u0443\u0440\u0430 \u043a\u0430\u043a \u0435\u0434\u0438\u043d\u044b\u0439 \u0438\u0441\u0442\u043e\u0447\u043d\u0438\u043a \u043f\u0440\u0430\u0432\u0434\u044b:\n```python\n# conftest.py\n@pytest.fixture(scope=\"session\")\ndef created_event_data(request) -> dict:\n    \"\"\"\u0414\u0430\u043d\u043d\u044b\u0435 \u0441\u043e\u0437\u0434\u0430\u043d\u043d\u043e\u0433\u043e \u0438\u0432\u0435\u043d\u0442\u0430 \u2014 \u043b\u0438\u0431\u043e \u0438\u0437 UI \u0442\u0435\u0441\u0442\u0430, \u043b\u0438\u0431\u043e \u0438\u0437 \u0444\u0430\u0439\u043b\u0430.\"\"\"\n    path = Path(__file__).parent / \"resources\" / \"created_event.json\"\n    if not path.exists():\n        pytest.skip(\"created_event.json \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d \u2014 \u0437\u0430\u043f\u0443\u0441\u0442\u0438\u0442\u0435 UI \u0442\u0435\u0441\u0442 \u043f\u0435\u0440\u0432\u044b\u043c\")\n    return json.loads(path.read_text())\n\n# test_adventure_event_public_api.py\ndef test_created_event_appears_in_public_api(\n    self,\n    public_api_client: LiveOpsPublicApiClient,\n    created_event_data: dict,  # <-- \u0444\u0438\u043a\u0441\u0442\u0443\u0440\u0430, \u043d\u0435 \u0440\u0443\u0447\u043d\u043e\u0439 \u0432\u044b\u0437\u043e\u0432\n) -> None:\n```\n\n---\n\n### 4. \u041d\u0410\u0414\u0415\u0416\u041d\u041e\u0421\u0422\u042c \u2014 \u0418\u0437\u0431\u044b\u0442\u043e\u0447\u043d\u044b\u0439 assert \u043f\u043e\u0441\u043b\u0435 \u043f\u043e\u0438\u0441\u043a\u0430 \u043f\u043e ID\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c | **\u0424\u0430\u0439\u043b:** `test_adventure_event_public_api.py:100\u2013103`\n\n`wait_for_event_by_id_in_public_api(event_id=X)` \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442 \u0438\u0432\u0435\u043d\u0442 \u0442\u043e\u043b\u044c\u043a\u043e \u0435\u0441\u043b\u0438 `event.meta.event_id == X`. \u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0441\u0440\u0430\u0437\u0443 \u043f\u043e\u0441\u043b\u0435 \u2014 \u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438 \u043d\u0435\u0432\u043e\u0437\u043c\u043e\u0436\u043d\u0430 \u0438 \u0441\u043e\u0437\u0434\u0430\u0451\u0442 \u043b\u043e\u0436\u043d\u043e\u0435 \u043e\u0449\u0443\u0449\u0435\u043d\u0438\u0435 \u043f\u043e\u043a\u0440\u044b\u0442\u0438\u044f.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\nfound_event = public_api_client.wait_for_event_by_id_in_public_api(event_id=expected_event_id)\n\n# \u042d\u0442\u043e\u0442 assert \u043d\u0435 \u043c\u043e\u0436\u0435\u0442 \u0443\u043f\u0430\u0441\u0442\u044c \u2014 \u043a\u043b\u0438\u0435\u043d\u0442 \u0443\u0436\u0435 \u0444\u0438\u043b\u044c\u0442\u0440\u043e\u0432\u0430\u043b \u043f\u043e event_id\nassert found_event.meta.event_id == expected_event_id, ...\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c** \u2014 \u0443\u0431\u0440\u0430\u0442\u044c \u0438\u0437\u0431\u044b\u0442\u043e\u0447\u043d\u044b\u0439 assert, \u0434\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0443 \u043a\u043e\u0442\u043e\u0440\u0430\u044f \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u043c\u043e\u0436\u0435\u0442 \u0443\u043f\u0430\u0441\u0442\u044c:\n```python\nfound_event = public_api_client.wait_for_event_by_id_in_public_api(event_id=expected_event_id)\n\n# \u0412\u043c\u0435\u0441\u0442\u043e \u0434\u0443\u0431\u043b\u0438\u0440\u0443\u044e\u0449\u0435\u0439 \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0438 \u2014 \u043f\u0440\u043e\u0432\u0435\u0440\u0438\u0442\u044c \u043d\u0430\u043b\u0438\u0447\u0438\u0435 \u0432\u0441\u0435\u0445 \u0442\u0438\u043f\u043e\u0432 \u043f\u0430\u043a\u0435\u0442\u043e\u0432 (\u043c\u0435\u0442\u043e\u0434 \u0443\u0436\u0435 \u0435\u0441\u0442\u044c \u0432 \u043c\u043e\u0434\u0435\u043b\u0438)\nassert found_event.has_all_package_types(), (\n    f\"\u0418\u0432\u0435\u043d\u0442 {expected_event_id} \u043d\u0435 \u0441\u043e\u0434\u0435\u0440\u0436\u0438\u0442 \u0432\u0441\u0435 \u0442\u0438\u043f\u044b \u043f\u0430\u043a\u0435\u0442\u043e\u0432. \"\n    f\"\u041d\u0430\u0439\u0434\u0435\u043d\u044b: {[p.package_type for p in found_event.packages]}\"\n)\n```\n\n---\n\n### 5. \u041f\u041e\u0414\u0414\u0415\u0420\u0416\u0418\u0412\u0410\u0415\u041c\u041e\u0421\u0422\u042c \u2014 \u041a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u044b \u0442\u0438\u043f\u043e\u0432 \u043f\u0430\u043a\u0435\u0442\u043e\u0432 \u0434\u0443\u0431\u043b\u0438\u0440\u0443\u044e\u0442\u0441\u044f\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c | **\u0424\u0430\u0439\u043b\u044b:** `test_adventure_event_public_api.py:37\u201340`, `api/models.py:121`\n\n\u041a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u044b `PACKAGE_TYPE_*` \u043e\u0431\u044a\u044f\u0432\u043b\u0435\u043d\u044b \u0432 \u0442\u0435\u0441\u0442-\u0444\u0430\u0439\u043b\u0435. \u0412 `has_all_package_types()` \u0442\u0435 \u0436\u0435 \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f \u043f\u0440\u043e\u043f\u0438\u0441\u0430\u043d\u044b \u043b\u0438\u0442\u0435\u0440\u0430\u043b\u0430\u043c\u0438 `{1, 2, 3, 4}`. \u041f\u0440\u0438 \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u0438\u0438 \u043d\u043e\u0432\u043e\u0433\u043e \u0442\u0438\u043f\u0430 \u043d\u0443\u0436\u043d\u043e \u043c\u0435\u043d\u044f\u0442\u044c \u0432 \u0434\u0432\u0443\u0445 \u043c\u0435\u0441\u0442\u0430\u0445.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\n# test_adventure_event_public_api.py\nPACKAGE_TYPE_BANNER = 1\nPACKAGE_TYPE_RESOURCE = 2\nPACKAGE_TYPE_LOCALIZATION = 3\nPACKAGE_TYPE_LEVELS = 4\n\n# api/models.py \u2014 \u0434\u0443\u0431\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0432 \u0432\u0438\u0434\u0435 \u043b\u0438\u0442\u0435\u0440\u0430\u043b\u043e\u0432\ndef has_all_package_types(self) -> bool:\n    required_types = {1, 2, 3, 4}  # \u2190 \u0442\u0435 \u0436\u0435 \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u044f\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c** \u2014 \u0435\u0434\u0438\u043d\u044b\u0439 Enum \u0432 `models.py`:\n```python\n# api/models.py\nfrom enum import IntEnum\n\nclass PackageType(IntEnum):\n    BANNER = 1\n    RESOURCE = 2\n    LOCALIZATION = 3\n    LEVELS = 4\n\n# models.py \u2014 \u043c\u0435\u0442\u043e\u0434 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442 Enum\ndef has_all_package_types(self) -> bool:\n    package_types = {pkg.package_type for pkg in self.packages}\n    return set(PackageType).issubset(package_types)\n\n# test \u0444\u0430\u0439\u043b \u2014 \u0438\u043c\u043f\u043e\u0440\u0442\u0438\u0440\u0443\u0435\u0442 \u0438\u0437 \u043c\u043e\u0434\u0435\u043b\u0438\nfrom api.models import PackageType\nassert package.package_type in PackageType\n```\n\n---\n\n### 6. \u041f\u041e\u0414\u0414\u0415\u0420\u0416\u0418\u0412\u0410\u0415\u041c\u041e\u0421\u0422\u042c \u2014 \u0414\u0443\u0431\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043b\u043e\u0433\u0438\u043a\u0438 find_event_by_title / find_event_by_id\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c (DRY) | **\u0424\u0430\u0439\u043b:** `api/client.py:101\u2013139`\n\n\u041e\u0431\u0430 \u043c\u0435\u0442\u043e\u0434\u0430 \u0438\u0434\u0435\u043d\u0442\u0438\u0447\u043d\u044b \u043f\u043e \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u0435: \u0437\u0430\u043f\u0440\u043e\u0441 \u2192 \u0438\u0442\u0435\u0440\u0430\u0446\u0438\u044f \u2192 \u0441\u0440\u0430\u0432\u043d\u0435\u043d\u0438\u0435 \u043f\u043e\u043b\u044f \u2192 \u043b\u043e\u0433\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435. \u0414\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u043d\u043e\u0432\u043e\u0433\u043e \u043f\u043e\u043b\u044f \u043f\u043e\u0438\u0441\u043a\u0430 \u043f\u043e\u0442\u0440\u0435\u0431\u0443\u0435\u0442 \u0435\u0449\u0451 \u043e\u0434\u043d\u043e\u0433\u043e \u043a\u043e\u043f\u0438\u043f\u0430\u0441\u0442\u0430.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\ndef find_event_by_title(self, event_title: str) -> PublicEventResponse | None:\n    api_response = self.get_event_core()\n    for event in api_response.events:\n        if event.title == event_title:\n            logger.info(\"\u0418\u0432\u0435\u043d\u0442 \u043d\u0430\u0439\u0434\u0435\u043d: title='%s'\", event.title)\n            return event\n    logger.warning(\"\u0418\u0432\u0435\u043d\u0442 \u0441 title='%s' \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\", event_title)\n    return None\n\ndef find_event_by_id(self, event_id: int) -> PublicEventResponse | None:\n    api_response = self.get_event_core()\n    for event in api_response.events:\n        if event.id == event_id:\n            logger.info(\"\u0418\u0432\u0435\u043d\u0442 \u043d\u0430\u0439\u0434\u0435\u043d: id=%s\", event.id)\n            return event\n    logger.warning(\"\u0418\u0432\u0435\u043d\u0442 \u0441 id=%s \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\", event_id)\n    return None\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:**\n```python\ndef _find_event(self, predicate, description: str) -> PublicEventResponse | None:\n    api_response = self.get_event_core()\n    for event in api_response.events:\n        if predicate(event):\n            logger.info(\"\u0418\u0432\u0435\u043d\u0442 \u043d\u0430\u0439\u0434\u0435\u043d: %s\", description)\n            return event\n    logger.warning(\"\u0418\u0432\u0435\u043d\u0442 \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d: %s\", description)\n    return None\n\ndef find_event_by_id(self, event_id: int) -> PublicEventResponse | None:\n    return self._find_event(lambda e: e.id == event_id, f\"id={event_id}\")\n\ndef find_event_by_title(self, event_title: str) -> PublicEventResponse | None:\n    return self._find_event(lambda e: e.title == event_title, f\"title='{event_title}'\")\n```\n\n---\n\n### 7. \u0411\u0415\u0417\u041e\u041f\u0410\u0421\u041d\u041e\u0421\u0422\u042c \u2014 os.popen \u0432\u043c\u0435\u0441\u0442\u043e subprocess\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0411\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u044c / \u0421\u0442\u0438\u043b\u044c | **\u0424\u0430\u0439\u043b:** `conftest.py:118`\n\n`os.popen` \u2014 \u0443\u0441\u0442\u0430\u0440\u0435\u0432\u0448\u0438\u0439 API, \u0438\u043d\u0442\u0435\u0440\u043f\u0440\u0435\u0442\u0438\u0440\u0443\u0435\u0442 \u0441\u0442\u0440\u043e\u043a\u0443 \u0447\u0435\u0440\u0435\u0437 shell. \u0411\u0435\u0437\u043e\u043f\u0430\u0441\u0435\u043d \u0437\u0434\u0435\u0441\u044c, \u043d\u043e \u043f\u0430\u0442\u0442\u0435\u0440\u043d \u043e\u043f\u0430\u0441\u0435\u043d \u0438 \u043d\u0430\u0440\u0443\u0448\u0430\u0435\u0442 \u043b\u0438\u043d\u0442\u0435\u0440\u044b (S605/S607 \u0432 bandit).\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\n\"Python.Version\": os.popen(\"python --version\").read().strip(),\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:**\n```python\nimport subprocess\n\"Python.Version\": subprocess.check_output([\"python\", \"--version\"], text=True).strip(),\n```\n\n---\n\n### 8. \u0421\u0422\u0418\u041b\u042c \u2014 \u041b\u0438\u0448\u043d\u0438\u0435 \u043f\u0440\u043e\u0431\u0435\u043b\u044b \u0438 \u0438\u043c\u043f\u043e\u0440\u0442\u044b \u0432\u043d\u0443\u0442\u0440\u0438 \u0444\u0443\u043d\u043a\u0446\u0438\u0438\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u0421\u0442\u0438\u043b\u044c | **\u0424\u0430\u0439\u043b\u044b:** `api/models.py:131`, `test_create_adventure_event_ui.py:135\u2013136`\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\n# models.py \u2014 \u043b\u0438\u0448\u043d\u0438\u0435 \u043f\u0440\u043e\u0431\u0435\u043b\u044b \u0432 \u043e\u0431\u044a\u044f\u0432\u043b\u0435\u043d\u0438\u0438 \u043a\u043b\u0430\u0441\u0441\u0430\nclass   PublicApiResponse(BaseModel):\n\n# test_create_adventure_event_ui.py \u2014 \u0438\u043c\u043f\u043e\u0440\u0442\u044b \u0432\u043d\u0443\u0442\u0440\u0438 \u0444\u0443\u043d\u043a\u0446\u0438\u0438 \u0431\u0435\u0437 \u043f\u0440\u0438\u0447\u0438\u043d\u044b\ndef _save_event_id_for_api_test(...):\n    import json          # \u0443\u0436\u0435 \u0435\u0441\u0442\u044c \u043d\u0430 \u0443\u0440\u043e\u0432\u043d\u0435 \u043c\u043e\u0434\u0443\u043b\u044f\n    from pathlib import Path\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:**\n```python\nclass PublicApiResponse(BaseModel):\n\n# \u0438\u043c\u043f\u043e\u0440\u0442\u044b \u2014 \u0442\u043e\u043b\u044c\u043a\u043e \u043d\u0430 \u0443\u0440\u043e\u0432\u043d\u0435 \u043c\u043e\u0434\u0443\u043b\u044f\n```\n\n---\n\n### 9. \u041f\u041e\u0414\u0414\u0415\u0420\u0416\u0418\u0412\u0410\u0415\u041c\u041e\u0421\u0422\u042c \u2014 has_all_package_types() \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0451\u043d, \u043d\u043e \u043d\u0435 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u0432 \u0442\u0435\u0441\u0442\u0435\n\n**\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f:** \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c | **\u0424\u0430\u0439\u043b\u044b:** `api/models.py:115`, `test_adventure_event_public_api.py:129\u2013136`\n\n\u041c\u043e\u0434\u0435\u043b\u044c \u043f\u0440\u0435\u0434\u043e\u0441\u0442\u0430\u0432\u043b\u044f\u0435\u0442 `has_all_package_types()`, \u043d\u043e \u0442\u0435\u0441\u0442 \u0438\u0442\u0435\u0440\u0438\u0440\u0443\u0435\u0442 \u043f\u0430\u043a\u0435\u0442\u044b \u0432\u0440\u0443\u0447\u043d\u0443\u044e \u0438 \u043f\u0440\u043e\u0432\u0435\u0440\u044f\u0435\u0442 \u043b\u0438\u0448\u044c `len > 0`. \u041f\u043e\u043b\u043d\u044b\u0439 \u043d\u0430\u0431\u043e\u0440 \u0442\u0438\u043f\u043e\u0432 \u043f\u0430\u043a\u0435\u0442\u043e\u0432 \u043d\u0435 \u043f\u0440\u043e\u0432\u0435\u0440\u044f\u0435\u0442\u0441\u044f.\n\n\u274c **\u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430:**\n```python\nassert len(found_event.packages) > 0, \"\u043d\u0435\u0442 \u043f\u0430\u043a\u0435\u0442\u043e\u0432\"\nfor package in found_event.packages:\n    _validate_package(package, expected_event_id)\n# has_all_package_types() \u043d\u0435 \u0432\u044b\u0437\u044b\u0432\u0430\u0435\u0442\u0441\u044f\n```\n\n\u2705 **\u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:**\n```python\nassert found_event.has_all_package_types(), (\n    f\"\u0418\u0432\u0435\u043d\u0442 {expected_event_id} \u043d\u0435 \u0441\u043e\u0434\u0435\u0440\u0436\u0438\u0442 \u0432\u0441\u0435 \u0442\u0438\u043f\u044b \u043f\u0430\u043a\u0435\u0442\u043e\u0432. \"\n    f\"\u041d\u0430\u0439\u0434\u0435\u043d\u044b \u0442\u0438\u043f\u044b: {sorted({p.package_type for p in found_event.packages})}\"\n)\nfor package in found_event.packages:\n    _validate_package(package, expected_event_id)\n```\n\n---\n\n### \u0418\u0442\u043e\u0433\u043e \u043f\u043e \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f\u043c\n\n| # | \u041d\u0430\u0445\u043e\u0434\u043a\u0430 | \u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f | \u041f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442 |\n|---|---------|-----------|-----------|\n| 1 | Duration \u043d\u0435
