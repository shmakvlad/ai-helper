    <script>
        const md = "## \u041a\u043e\u0434-\u0440\u0435\u0432\u044c\u044e: TestCreateAdventureEventUI\n\n---\n\n### 1. [\u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430] \u041c\u0435\u0436\u0442\u0435\u0441\u0442\u043e\u0432\u0430\u044f \u0441\u0432\u044f\u0437\u043d\u043e\u0441\u0442\u044c \u0447\u0435\u0440\u0435\u0437 \u0444\u0430\u0439\u043b\u043e\u0432\u0443\u044e \u0441\u0438\u0441\u0442\u0435\u043c\u0443 \u2014 **\u0411\u0430\u0433 / \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c**\n\n\u042d\u0442\u043e \u0441\u0430\u043c\u0430\u044f \u0441\u0435\u0440\u044c\u0451\u0437\u043d\u0430\u044f \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0430. `_save_event_id_for_api_test` \u0441\u043e\u0437\u0434\u0430\u0451\u0442 \u0441\u043a\u0440\u044b\u0442\u0443\u044e \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c: UI-\u0442\u0435\u0441\u0442 \u0434\u043e\u043b\u0436\u0435\u043d \u043e\u0442\u0440\u0430\u0431\u043e\u0442\u0430\u0442\u044c \u0440\u0430\u043d\u044c\u0448\u0435 API-\u0442\u0435\u0441\u0442\u0430, \u043f\u0430\u0440\u0430\u043b\u043b\u0435\u043b\u044c\u043d\u044b\u0439 \u0437\u0430\u043f\u0443\u0441\u043a \u043b\u043e\u043c\u0430\u0435\u0442\u0441\u044f, \u043f\u0440\u0438 \u0441\u0431\u043e\u0435 \u043d\u0430 \u043b\u044e\u0431\u043e\u043c \u0448\u0430\u0433\u0435 API-\u0442\u0435\u0441\u0442 \u043f\u043e\u043b\u0443\u0447\u0430\u0435\u0442 \u0443\u0441\u0442\u0430\u0440\u0435\u0432\u0448\u0438\u0435 \u0434\u0430\u043d\u043d\u044b\u0435.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nwith allure.step(\"\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c \u0434\u0430\u043d\u043d\u044b\u0435 \u0438\u0432\u0435\u043d\u0442\u0430 \u0434\u043b\u044f API \u0442\u0435\u0441\u0442\u0430\"):\n    _save_event_id_for_api_test(event_id, event_title, analytics_id)\n\ndef _save_event_id_for_api_test(...) -> None:\n    shared_data_path = Path(__file__).parent.parent / \"resources\" / \"created_event.json\"\n    shared_data_path.write_text(json.dumps(data, indent=2))\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# conftest.py \u2014 shared fixture \u0447\u0435\u0440\u0435\u0437 pytest cache \u0438\u043b\u0438 \u043e\u0442\u0434\u0435\u043b\u044c\u043d\u044b\u0439 API-\u043a\u043b\u0438\u0435\u043d\u0442\n@pytest.fixture(scope=\"session\")\ndef created_event(event_test_data) -> dict:\n    \"\"\"\u0421\u043e\u0437\u0434\u0430\u0451\u0442 \u0438\u0432\u0435\u043d\u0442 \u0447\u0435\u0440\u0435\u0437 API, \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442 \u0434\u0430\u043d\u043d\u044b\u0435. \u0418\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u0438 UI, \u0438 API \u0442\u0435\u0441\u0442\u0430\u043c\u0438.\"\"\"\n    response = admin_api_client.create_adventure_event(event_test_data)\n    return {\"event_id\": response.id, \"event_title\": response.title, ...}\n\n# \u0412 API-\u0442\u0435\u0441\u0442\u0435:\ndef test_published_event_in_public_api(created_event):\n    event = public_api.get_event(created_event[\"event_id\"])\n    assert event.status == \"Published\"\n```\n\n---\n\n### 2. [\u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430] \u041b\u043e\u043a\u0430\u0442\u043e\u0440 \u0432 \u0442\u0435\u043b\u0435 \u0442\u0435\u0441\u0442\u0430 \u2014 **\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c**\n\n\u041b\u043e\u043a\u0430\u0442\u043e\u0440 `h2:has-text('Edit Event')` \u0436\u0438\u0432\u0451\u0442 \u043d\u0430\u043f\u0440\u044f\u043c\u0443\u044e \u0432 \u0442\u0435\u0441\u0442\u0435, \u0430 \u043d\u0435 \u0432 Page Object. \u041f\u0440\u0438 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u0438 \u0440\u0430\u0437\u043c\u0435\u0442\u043a\u0438 \u043f\u0440\u0438\u0434\u0451\u0442\u0441\u044f \u0438\u0441\u043a\u0430\u0442\u044c \u043f\u043e \u0432\u0441\u0435\u043c \u0442\u0435\u0441\u0442\u0430\u043c.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nwith allure.step(\"\u041f\u0440\u043e\u0432\u0435\u0440\u0438\u0442\u044c \u043f\u0435\u0440\u0435\u0445\u043e\u0434 \u043d\u0430 \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443 \u0440\u0435\u0434\u0430\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f\"):\n    expect(page.locator(\"h2:has-text('Edit Event')\")).to_be_visible(timeout=10_000)\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# pages/event_detail_page.py\nclass EventDetailPage:\n    EDIT_HEADING = \"h2:has-text('Edit Event')\"\n\n    def assert_on_page(self, timeout: int = TIMEOUT_DEFAULT) -> None:\n        expect(self.page.locator(self.EDIT_HEADING)).to_be_visible(timeout=timeout)\n\n# \u0412 \u0442\u0435\u0441\u0442\u0435:\nwith allure.step(\"\u041f\u0440\u043e\u0432\u0435\u0440\u0438\u0442\u044c \u043f\u0435\u0440\u0435\u0445\u043e\u0434 \u043d\u0430 \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u0443 \u0440\u0435\u0434\u0430\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f\"):\n    detail_page.assert_on_page()\n```\n\n---\n\n### 3. [\u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430] \u0421\u043a\u0440\u044b\u0442\u044b\u0435 \u0430\u0441\u0441\u0435\u0440\u0442\u044b \u0432 Page Object \u2014 **\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c / \u041d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c**\n\n`detail_page.verify_status(...)` \u043f\u0440\u044f\u0447\u0435\u0442 \u043b\u043e\u0433\u0438\u043a\u0443 \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0438. \u041d\u0435\u044f\u0441\u043d\u043e: \u044d\u0442\u043e Playwright `expect`? \u041e\u0431\u044b\u0447\u043d\u044b\u0439 `assert`? \u041f\u0440\u0438 \u043f\u0430\u0434\u0435\u043d\u0438\u0438 \u0441\u043e\u043e\u0431\u0449\u0435\u043d\u0438\u0435 \u043e\u0431 \u043e\u0448\u0438\u0431\u043a\u0435 \u0431\u0443\u0434\u0435\u0442 \u043d\u0435\u0447\u0438\u0442\u0430\u0435\u043c\u044b\u043c. \u0410\u0441\u0441\u0435\u0440\u0442\u044b \u0434\u043e\u043b\u0436\u043d\u044b \u0431\u044b\u0442\u044c \u044f\u0432\u043d\u044b\u043c\u0438 \u0432 \u0442\u0435\u043b\u0435 \u0442\u0435\u0441\u0442\u0430.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\ndetail_page.change_status_to_testing()\ndetail_page.verify_status(\"Testing\")\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# Page Object \u0442\u043e\u043b\u044c\u043a\u043e \u043c\u0435\u043d\u044f\u0435\u0442 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435:\ndetail_page.change_status_to_testing()\n\n# \u0422\u0435\u0441\u0442 \u044f\u0432\u043d\u043e \u043f\u0440\u043e\u0432\u0435\u0440\u044f\u0435\u0442:\nwith allure.step(\"\u0423\u0431\u0435\u0434\u0438\u0442\u044c\u0441\u044f, \u0447\u0442\u043e \u0441\u0442\u0430\u0442\u0443\u0441 \u0438\u0437\u043c\u0435\u043d\u0438\u043b\u0441\u044f \u043d\u0430 'Testing'\"):\n    expect(detail_page.status_badge).to_have_text(EventStatus.TESTING)\n```\n\n---\n\n### 4. [\u041d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c] \u041d\u0435\u0442 teardown \u2014 \u0442\u0435\u0441\u0442 \u0437\u0430\u0433\u0440\u044f\u0437\u043d\u044f\u0435\u0442 \u0441\u0440\u0435\u0434\u0443 \u2014 **\u0411\u0430\u0433**\n\n\u0422\u0435\u0441\u0442 \u0441\u043e\u0437\u0434\u0430\u0451\u0442 \u0438 \u043f\u0443\u0431\u043b\u0438\u043a\u0443\u0435\u0442 \u0438\u0432\u0435\u043d\u0442, \u043d\u043e \u043d\u0435 \u0447\u0438\u0441\u0442\u0438\u0442 \u0437\u0430 \u0441\u043e\u0431\u043e\u0439. \u041f\u043e\u0432\u0442\u043e\u0440\u043d\u044b\u0439 \u0437\u0430\u043f\u0443\u0441\u043a \u043c\u043e\u0436\u0435\u0442 \u0441\u043b\u043e\u043c\u0430\u0442\u044c\u0441\u044f \u0438\u0437-\u0437\u0430 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430 \u0434\u0430\u043d\u043d\u044b\u0445 (\u043d\u0430\u043f\u0440\u0438\u043c\u0435\u0440, \u0434\u0443\u0431\u043b\u0438\u043a\u0430\u0442 `analytics_id`).\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\n# \u041f\u043e\u0441\u043b\u0435 \u043f\u0443\u0431\u043b\u0438\u043a\u0430\u0446\u0438\u0438 \u0438\u0432\u0435\u043d\u0442\u0430 \u2014 \u043d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043f\u0440\u043e\u0438\u0441\u0445\u043e\u0434\u0438\u0442, \u0438\u0432\u0435\u043d\u0442 \u043e\u0441\u0442\u0430\u0451\u0442\u0441\u044f \u0432 \u0441\u0438\u0441\u0442\u0435\u043c\u0435\ndetail_page.change_status_to_published()\ndetail_page.verify_status(\"Published\")\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# conftest.py\n@pytest.fixture\ndef cleanup_event(admin_api_client):\n    created_ids = []\n    yield created_ids\n    for event_id in created_ids:\n        admin_api_client.delete_event(event_id)\n\n# \u0412 \u0442\u0435\u0441\u0442\u0435:\ndef test_create_adventure_event_and_publish(self, ..., cleanup_event):\n    ...\n    event_id = create_page.save_and_wait_redirect()\n    cleanup_event.append(event_id)  # \u0433\u0430\u0440\u0430\u043d\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u0430\u044f \u043e\u0447\u0438\u0441\u0442\u043a\u0430\n```\n\n---\n\n### 5. [\u041d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c] \u0421\u043b\u0430\u0431\u044b\u0439 \u0430\u0441\u0441\u0435\u0440\u0442 \u043d\u0430 event_id \u2014 **\u0411\u0430\u0433**\n\n`isdigit()` \u043d\u0435 \u0433\u0430\u0440\u0430\u043d\u0442\u0438\u0440\u0443\u0435\u0442 \u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u043e\u0441\u0442\u044c ID. \u0421\u0442\u0440\u043e\u043a\u0430 `\"0\"` \u043f\u0440\u043e\u0439\u0434\u0451\u0442 \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0443, \u0445\u043e\u0442\u044f \u044d\u0442\u043e \u043d\u0435\u0432\u0430\u043b\u0438\u0434\u043d\u044b\u0439 ID. \u041d\u0435 \u043f\u0440\u043e\u0432\u0435\u0440\u044f\u0435\u0442\u0441\u044f, \u0447\u0442\u043e ID \u0432\u043e\u043e\u0431\u0449\u0435 \u0441\u0443\u0449\u0435\u0441\u0442\u0432\u0443\u0435\u0442 \u0432 \u0441\u0438\u0441\u0442\u0435\u043c\u0435.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nassert event_id.isdigit(), f\"\u041e\u0436\u0438\u0434\u0430\u043b\u0441\u044f \u0447\u0438\u0441\u043b\u043e\u0432\u043e\u0439 ID \u0438\u0432\u0435\u043d\u0442\u0430, \u043f\u043e\u043b\u0443\u0447\u0435\u043d\u043e: '{event_id}'\"\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\nassert event_id.isdigit() and int(event_id) > 0, (\n    f\"\u041e\u0436\u0438\u0434\u0430\u043b\u0441\u044f \u043f\u043e\u043b\u043e\u0436\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u0447\u0438\u0441\u043b\u043e\u0432\u043e\u0439 ID \u0438\u0432\u0435\u043d\u0442\u0430, \u043f\u043e\u043b\u0443\u0447\u0435\u043d\u043e: '{event_id}'\"\n)\n```\n\n---\n\n### 6. [\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c] \u041c\u0430\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0441\u0442\u0440\u043e\u043a\u0438 \u0441\u0442\u0430\u0442\u0443\u0441\u043e\u0432 \u2014 **\u0421\u0442\u0438\u043b\u044c / \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c**\n\n`\"Draft\"`, `\"Testing\"`, `\"Published\"` \u0432\u0441\u0442\u0440\u0435\u0447\u0430\u044e\u0442\u0441\u044f \u0432 \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u0438\u0445 \u043c\u0435\u0441\u0442\u0430\u0445. \u041f\u0440\u0438 \u043f\u0435\u0440\u0435\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u0438\u0438 \u0441\u0442\u0430\u0442\u0443\u0441\u0430 \u0432 UI \u043d\u0443\u0436\u043d\u043e \u0431\u0443\u0434\u0435\u0442 \u043c\u0435\u043d\u044f\u0442\u044c \u0432\u0441\u0451 \u0432\u0440\u0443\u0447\u043d\u0443\u044e.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nassert current_status == \"Draft\", ...\ndetail_page.verify_status(\"Testing\")\ndetail_page.verify_status(\"Published\")\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# constants.py \u0438\u043b\u0438 models/event.py\nclass EventStatus:\n    DRAFT = \"Draft\"\n    TESTING = \"Testing\"\n    PUBLISHED = \"Published\"\n\n# \u0412 \u0442\u0435\u0441\u0442\u0435:\nassert current_status == EventStatus.DRAFT, ...\ndetail_page.verify_status(EventStatus.TESTING)\n```\n\n---\n\n### 7. [\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c] \u0425\u0430\u0440\u0434\u043a\u043e\u0434 timeout \u0431\u0435\u0437 \u0438\u043c\u0435\u043d\u043e\u0432\u0430\u043d\u043d\u043e\u0439 \u043a\u043e\u043d\u0441\u0442\u0430\u043d\u0442\u044b \u2014 **\u0421\u0442\u0438\u043b\u044c**\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nexpect(page.locator(\"h2:has-text('Edit Event')\")).to_be_visible(timeout=10_000)\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# constants.py\nTIMEOUT_DEFAULT = 10_000\nTIMEOUT_UPLOAD = 30_000\n\nexpect(...).to_be_visible(timeout=TIMEOUT_DEFAULT)\n```\n\n---\n\n### 8. [\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c] \u0420\u0443\u0447\u043d\u0430\u044f \u0441\u0431\u043e\u0440\u043a\u0430 JSON-\u0441\u0442\u0440\u043e\u043a\u0438 \u0432 attach \u2014 **\u0421\u0442\u0438\u043b\u044c / \u0411\u0430\u0433**\n\n\u0415\u0441\u043b\u0438 `event_title` \u0441\u043e\u0434\u0435\u0440\u0436\u0438\u0442 \u043a\u0430\u0432\u044b\u0447\u043a\u0438 \u0438\u043b\u0438 \u0441\u043f\u0435\u0446\u0441\u0438\u043c\u0432\u043e\u043b\u044b \u2014 JSON \u0431\u0443\u0434\u0435\u0442 \u043d\u0435\u0432\u0430\u043b\u0438\u0434\u043d\u044b\u043c.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nallure.attach(\n    f'{{\"event_id\": {event_id}, \"event_title\": \"{event_title}\", \"analytics_id\": \"{analytics_id}\"}}',\n    ...\n)\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\nimport json\n\nallure.attach(\n    json.dumps({\"event_id\": int(event_id), \"event_title\": event_title, \"analytics_id\": analytics_id}, indent=2),\n    name=\"Saved Event Data (JSON)\",\n    attachment_type=allure.attachment_type.JSON,\n)\n```\n\n---\n\n### 9. [\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c] \u0425\u0430\u0440\u0434\u043a\u043e\u0434 URL \u0441\u0440\u0435\u0434\u044b \u0432 \u0434\u0435\u043a\u043e\u0440\u0430\u0442\u043e\u0440\u0435 \u2014 **\u0421\u0442\u0438\u043b\u044c**\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\n@allure.link(url=\"https://tools-test.com\", name=\"LiveOps Admin\")\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c:\n```python\n# config.py\nLIVEOPS_ADMIN_URL = os.getenv(\"LIVEOPS_ADMIN_URL\", \"https://tools-test.com\")\n\n@allure.link(url=config.LIVEOPS_ADMIN_URL, name=\"LiveOps Admin\")\n```\n\n---\n\n### 10. [DRY] \u041d\u0435\u043f\u043e\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u0434\u043e\u0441\u0442\u0443\u043f \u043a \u0434\u0430\u043d\u043d\u044b\u043c \u0444\u0438\u043a\u0441\u0442\u0443\u0440\u044b \u2014 **\u0421\u0442\u0438\u043b\u044c**\n\n\u0427\u0430\u0441\u0442\u044c \u043a\u043b\u044e\u0447\u0435\u0439 \u0438\u0437\u0432\u043b\u0435\u043a\u0430\u0435\u0442\u0441\u044f \u0432 \u043f\u0435\u0440\u0435\u043c\u0435\u043d\u043d\u044b\u0435, \u0447\u0430\u0441\u0442\u044c \u043e\u0431\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f \u043a \u0441\u043b\u043e\u0432\u0430\u0440\u044e \u043d\u0430\u043f\u0440\u044f\u043c\u0443\u044e \u2014 \u0431\u0435\u0437 \u0432\u0438\u0434\u0438\u043c\u043e\u0439 \u043f\u0440\u0438\u0447\u0438\u043d\u044b.\n\n\u274c \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u043d\u044b\u0439 \u0444\u0440\u0430\u0433\u043c\u0435\u043d\u0442:\n```python\nevent_title = event_test_data[\"title\"]       # \u0438\u0437\u0432\u043b\u0435\u0447\u0435\u043d\u043e\nanalytics_id = event_test_data[\"analytics_id\"]  # \u0438\u0437\u0432\u043b\u0435\u0447\u0435\u043d\u043e\nevent_start = event_test_data[\"event_start\"]    # \u0438\u0437\u0432\u043b\u0435\u0447\u0435\u043d\u043e\n\ncreate_page.fill_duration(\n    days=event_test_data[\"duration_days\"],    # \u043d\u0430\u043f\u0440\u044f\u043c\u0443\u044e \u0438\u0437 dict\n    hours=event_test_data[\"duration_hours\"],  # \u043d\u0430\u043f\u0440\u044f\u043c\u0443\u044e \u0438\u0437 dict\n    minutes=event_test_data[\"duration_minutes\"],\n)\n```\n\n\u2705 \u041a\u0430\u043a \u0434\u043e\u043b\u0436\u043d\u043e \u0431\u044b\u0442\u044c \u2014 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c dataclass/TypedDict \u0434\u043b\u044f \u0444\u0438\u043a\u0441\u0442\u0443\u0440\u044b:\n```python\n# fixtures.py\n@dataclass\nclass EventTestData:\n    title: str\n    analytics_id: str\n    event_start: str\n    duration_days: int\n    duration_hours: int\n    duration_minutes: int\n\n# \u0412 \u0442\u0435\u0441\u0442\u0435 \u2014 \u0435\u0434\u0438\u043d\u043e\u043e\u0431\u0440\u0430\u0437\u043d\u044b\u0439 \u0434\u043e\u0441\u0442\u0443\u043f:\ncreate_page.fill_duration(\n    days=event_test_data.duration_days,\n    hours=event_test_data.duration_hours,\n    minutes=event_test_data.duration_minutes,\n)\n```\n\n---\n\n### \u0418\u0442\u043e\u0433 \u043f\u043e \u043a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f\u043c\n\n| # | \u041f\u0440\u043e\u0431\u043b\u0435\u043c\u0430 | \u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f | \u041f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442 |\n|---|----------|-----------|-----------|\n| 1 | \u041c\u0435\u0436\u0442\u0435\u0441\u0442\u043e\u0432\u0430\u044f \u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u044c \u0447\u0435\u0440\u0435\u0437 \u0444\u0430\u0439\u043b | \u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430 / \u0411\u0430\u0433 | \u041a\u0440\u0438\u0442\u0438\u0447\u043d\u043e |\n| 2 | \u041b\u043e\u043a\u0430\u0442\u043e\u0440 \u0432 \u0442\u0435\u043b\u0435 \u0442\u0435\u0441\u0442\u0430 | \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c | \u0412\u044b\u0441\u043e\u043a\u0438\u0439 |\n| 3 | \u0421\u043a\u0440\u044b\u0442\u044b\u0435 \u0430\u0441\u0441\u0435\u0440\u0442\u044b \u0432 Page Object | \u041d\u0430\u0434\u0451\u0436\u043d\u043e\u0441\u0442\u044c | \u0412\u044b\u0441\u043e\u043a\u0438\u0439 |\n| 4 | \u041d\u0435\u0442 teardown | \u0411\u0430\u0433 | \u0412\u044b\u0441\u043e\u043a\u0438\u0439 |\n| 5 | \u0421\u043b\u0430\u0431\u044b\u0439 \u0430\u0441\u0441\u0435\u0440\u0442 \u043d\u0430 event_id | \u0411\u0430\u0433 | \u0421\u0440\u0435\u0434\u043d\u0438\u0439 |\n| 6 | \u041c\u0430\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0441\u0442\u0440\u043e\u043a\u0438 \u0441\u0442\u0430\u0442\u0443\u0441\u043e\u0432 | \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u043c\u043e\u0441\u0442\u044c | \u0421\u0440\u0435\u0434\u043d\u0438\u0439 |\n| 7 | \u0425\u0430\u0440\u0434\u043a\u043e\u0434 timeout | \u0421\u0442\u0438\u043b\u044c | \u041d\u0438\u0437\u043a\u0438\u0439 |\n| 8 | \u0420\u0443\u0447\u043d\u0430\u044f \u0441\u0431\u043e\u0
